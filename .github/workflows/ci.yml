# CI — every push/PR runs the same gate as local `npm run check`.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  build:
    # The OpenNext/Cloudflare build catches bundling/runtime breaks that `check`
    # (tsc/eslint/vitest) does NOT — e.g. a Node-runtime middleware OpenNext
    # rejects — which otherwise only surface at deploy. (No Cloudflare auth: this
    # builds the Worker, it does not deploy.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run cf:build
